<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages SPA redirect (adapted from rafgraph/spa-github-pages).
      (function () {
        var l = window.location
        var pathSegmentsToKeep = 0

        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + pathSegmentsToKeep)
              .join('/') +
            '/?/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(pathSegmentsToKeep)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash,
        )
      })()
    </script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #000;
        color: #fff;
        font-family:
          "Avenir Next",
          "Segoe UI",
          "Helvetica Neue",
          Arial,
          sans-serif;
      }
      p {
        margin: 0;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <p>Looking for the right page…</p>
  </body>
</html>
